name: Deploy iOS to TestFlight

on:
  push:
    branches: [main]

# Stop the GitHub job when a newer merge lands on main.
concurrency:
  group: deploy-ios-main
  cancel-in-progress: true

jobs:
  build-and-submit:
    name: Build & submit (TestFlight)
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cancel stale EAS iOS builds
        run: node scripts/cancel-stale-eas-ios-deploys.js

      - name: Build iOS and submit to TestFlight
        run: |
          npx eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            --wait \
            --auto-submit

      - name: Deployment summary
        run: |
          {
            echo "## iOS deployed to TestFlight"
            echo
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Commit: [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
            echo "- Profile: \`production\`"
            echo
            echo "Previous in-flight EAS builds on \`main\` are cancelled before each deploy."
            echo "Open [App Store Connect → TestFlight](https://appstoreconnect.apple.com/apps) once processing completes (~10–15 min)."
          } >> "$GITHUB_STEP_SUMMARY"
